
services:
  mysql:
    image: mysql:8.0
    container_name: autodiagnostico-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: autodiagnostico
    volumes:
      - mysql_data:/var/lib/mysql

  mcp-server:
    build: ./mcp-server
    container_name: autodiagnostico-mcp
    restart: unless-stopped
    ports:
      - "5005:5005"

  backend:
    build: ./backend
    container_name: autodiagnostico-backend
    restart: unless-stopped
    ports:
      - "7777:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/autodiagnostico?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - SPRING_JPA_HIBERNATE_DDL_AUTO=create-drop
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SPRING_AI_MCP_CLIENT_SSE_CONNECTIONS_AUTODIAGNOSTICO_MCP_URL=http://mcp-server:5005
    env_file:
      - .env
    volumes:
      - ./backend/src/main/resources/scraper-output:/app/scraper-output
      - ./backend/src/main/resources/logos:/app/logos
      - ./backend/src/main/resources/models:/app/models
    depends_on:
      - mysql
      - mcp-server

  frontend:
    build: ./frontend
    container_name: autodiagnostico-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
