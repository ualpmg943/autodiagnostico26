spring.application.name=Autodiagnostico
server.port=8081

# Data Source Configuration (MySQL)
spring.datasource.url=jdbc:mysql://mysql:3306/autodiagnostico?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# CORS Configuration
spring.web.cors.allowed-origins=http://localhost:80

# --- Spring AI: Gemini (Google AI Studio) ---
spring.ai.google.genai.api-key=${GEMINI_API_KEY:}
spring.ai.google.genai.chat.options.model=gemini-2.5-flash
spring.ai.google.genai.chat.options.temperature=0.2
spring.ai.google.genai.chat.options.max-output-tokens=2048

# --- Spring AI: MCP Client (conecta al mcp-server) ---
spring.ai.mcp.client.enabled=true
spring.ai.mcp.client.type=async
spring.ai.mcp.client.sse.connections.autodiagnostico-mcp.url=http://mcp-server:5005

# Debugging
logging.level.root=INFO
logging.level.org.springframework=DEBUG
logging.level.your.package=TRACE

# Show SQL if using JPA
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE

