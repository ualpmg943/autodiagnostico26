spring.application.name=Autodiagnostico
server.port=8081

# Local MySQL (without Docker)
spring.datasource.url=jdbc:mysql://localhost:3306/autodiagnostico?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Frontend local dev server
spring.web.cors.allowed-origins=http://localhost:4200

# --- Spring AI: Gemini (Google AI Studio) ---
spring.ai.google.genai.api-key=${GEMINI_API_KEY:}
spring.ai.google.genai.chat.options.model=gemini-2.5-flash
spring.ai.google.genai.chat.options.temperature=0.2
spring.ai.google.genai.chat.options.max-output-tokens=2048

# --- Spring AI: MCP Client (apunta al mcp-server local) ---
spring.ai.mcp.client.enabled=true
spring.ai.mcp.client.type=async
spring.ai.mcp.client.sse.connections.autodiagnostico-mcp.url=http://localhost:5005

# Logging
logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=DEBUG
