<div class="profile-layout">

  <header class="profile-header">
    <a routerLink="/home" class="profile-brand">
      <img src="logo.png" alt="AutoDiag" class="profile-logo" width="40" height="40"/>
      <div class="profile-brand-text">
        <span class="profile-brand-name">AutoDiagnostico</span>
        <span class="profile-brand-sub">Panel de cuenta</span>
      </div>
    </a>
    <div class="profile-header-actions">
      <a routerLink="/home" class="profile-home-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        <span>Volver al inicio</span>
      </a>
    </div>
  </header>

  <div class="profile-body">
    <div class="profile-container">

      <aside class="profile-sidebar">
        <nav class="sidebar-nav">
          <div class="sidebar-top">
            <a routerLink="/perfil/informacion" routerLinkActive="sidebar-item--active" class="sidebar-item">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
              <span>Información personal</span>
            </a>

            <a routerLink="/perfil/seguridad" routerLinkActive="sidebar-item--active" class="sidebar-item">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              <span>Inicio de sesión y seguridad</span>
            </a>

            <a routerLink="/perfil/vehiculo" routerLinkActive="sidebar-item--active" class="sidebar-item">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
              </svg>
              <span>Mis vehículos</span>
            </a>

            <a routerLink="/perfil/preferencias" routerLinkActive="sidebar-item--active" class="sidebar-item">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                <line x1="3" y1="9" x2="21" y2="9"/>
                <line x1="9" y1="21" x2="9" y2="9"/>
              </svg>
              <span>Estado en taller</span>
            </a>
          </div>

          <div class="sidebar-bottom">
            <hr class="sidebar-divider"/>

            <button class="sidebar-item" (click)="onLogout()">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                <polyline points="16 17 21 12 16 7"/>
                <line x1="21" y1="12" x2="9" y2="12"/>
              </svg>
              <span>Cerrar sesión</span>
            </button>

            <button class="sidebar-item sidebar-item--danger" (click)="onDeleteAccount()">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
              </svg>
              <span>Eliminar cuenta</span>
            </button>
          </div>
        </nav>
      </aside>

      <main class="profile-content">
        <router-outlet />
      </main>

    </div>
  </div>
</div>

@if (showDeleteModal) {
  <div class="modal-overlay" (click)="cancelDelete()">
    <div class="modal-card" (click)="$event.stopPropagation()">
      <h3>Eliminar cuenta</h3>
      <p>¿Estás seguro de que quieres eliminar tu cuenta? Esta acción no se puede deshacer y perderás todos tus datos.</p>
      <div class="modal-actions">
        <button class="btn btn-secondary" (click)="cancelDelete()">Cancelar</button>
        <button class="btn btn-danger" (click)="confirmDelete()">Eliminar cuenta</button>
      </div>
    </div>
  </div>
}
